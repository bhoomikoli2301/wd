<html>
<head>
<title>Registration page</title>
</head>
<body>
  <form action="regComplete.html">
  <label><b>First Name</b></label>
  <input type="text" required><br><br>
  <label><b>Middle Name</b></label>
  <input type="text" required><br><br>
  <label><b>Last Name</b></label>
  <input type="text" required><br><br>
  <label><b>Address</b></label>
  <input type="text" required><br><br>
  <label><b>Mobile no</b></label>
  <input type="text" required><br>
  <br>
  <b>Gender:</b><br>
  <input type="radio">Male<br>
  <input type="radio">female<br><br>

  <b>Name of college:</b><br>
  <select id="college" name="collage">
    <option>Option</option>
    <option value="KIT">KIT</option>
    <option value="RIT">RIT</option>
    <option value="DYPCET">DYPCET</option>
    <option value="DKIT">DKIT</option>
    <option value="DYPSEM">DYPSEM</option>
  </select><br><br>
  
  <b>Branch:</b><br>
  <select id="branch" name="branch">
    <option>Branch</option>
    <option value="CSE">CSE</option>
    <option value="CSE-DS">CSE-DS</option>
    <option value="CSE-AIML">CSE-AIML</option>
    <option value="CIVIL">CIVIL</option>
    <option value="Mechanical">Mechanical</option>
    <option value="Chemical">Chemical</option>
    <option value="ETC">ETC</option>
  </select><br><br>
  
  <b>Technical Skills:</b><br>
  <input type="checkbox">C<br>
  <input type="checkbox">CPP<br>
  <input type="checkbox">Java<br>
  <input type="checkbox">Python<br>
  <input type="checkbox">DSA<br><br> 
  
  <input type="submit" value="Submit">         
</form>
</body>
</html>
