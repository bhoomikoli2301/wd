<!DOCTYPE html>
<html>
	<head>
		<title>Tags</title>
	</head>
	<body>
		<b>This is a bold tag</b><hr><br>
		<strong>This is a strong tag</strong><hr><br>
		<i>this is italic tag</i><hr><br>
		<mark>This is mark tag</mark><hr><br>
		<del>this is delete tag</del><hr><br>
		<pre>
			for(int i=0; i<=5; i++){
				System.out.println(i*i);
			}
		</pre><hr><br>
		<small>this is small tag</small><hr><br>
		<em>this is emphasis tag</em><hr><br>
	</body>
</html>
